<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Luminelle — UGC Reviews</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── RESET & BASE ─────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#083D77;--blue:#2bb3f3;--bg:#FAFAF8;
  --radius:14px;--gap:12px;--transition:.5s cubic-bezier(.4,0,.2,1);
}
body{background:var(--bg);font-family:'Poppins',sans-serif;-webkit-font-smoothing:antialiased}

/* ─── SECTION ─────────────────────────────────────── */
.ugc{width:100%;padding:48px 0 52px;overflow:hidden;position:relative}

/* ─── SLIDER VIEWPORT ─────────────────────────────── */
.ugc-viewport{
  position:relative;
  padding:0 48px;
  cursor:grab;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.ugc-viewport:active{cursor:grabbing}
@media(max-width:640px){.ugc-viewport{padding:0 16px;cursor:default}}

/* ─── TRACK ───────────────────────────────────────── */
.ugc-track{
  display:flex;
  gap:var(--gap);
  will-change:transform;
  transition:transform var(--transition);
}
.ugc-track.dragging{transition:none}

/* ─── CARD ────────────────────────────────────────── */
.ugc-card{
  flex-shrink:0;
  border-radius:var(--radius);
  overflow:hidden;
  position:relative;
  background:#111;
  aspect-ratio:9/16;
  max-height:300px;
  cursor:pointer;
}

/* ─── THUMBNAIL ───────────────────────────────────── */
.ugc-thumb{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  pointer-events:none;
  background:#1a1a1a;
}

/* ─── GRADIENT OVERLAY ────────────────────────────── */
.ugc-grad{
  position:absolute;inset:0;
  background:linear-gradient(
    to top,
    rgba(0,0,0,.72) 0%,
    rgba(0,0,0,.18) 45%,
    transparent 70%
  );
  z-index:1;
  pointer-events:none;
}

/* ─── PLAY BUTTON ─────────────────────────────────── */
.ugc-play{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:2;
  width:48px;height:48px;
  border-radius:50%;
  background:rgba(255,255,255,.22);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1.5px solid rgba(255,255,255,.45);
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s ease,background .2s;
}
.ugc-card:hover .ugc-play{background:rgba(255,255,255,.32);transform:translate(-50%,-50%) scale(1.08)}
.ugc-play svg{width:16px;height:16px;fill:#fff;margin-left:2px}

/* ─── META ─────────────────────────────────────────── */
.ugc-meta{
  position:absolute;bottom:10px;left:12px;right:12px;
  z-index:2;pointer-events:none;
}
.ugc-stars{
  display:flex;gap:2px;margin-bottom:4px;
}
.ugc-stars svg{width:10px;height:10px;fill:#FFD700}
.ugc-name{
  font-size:11px;font-weight:600;color:#fff;
  letter-spacing:.01em;
  text-shadow:0 1px 4px rgba(0,0,0,.5);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ─── ARROWS ─────────────────────────────────────── */
.ugc-arrow{
  position:absolute;top:50%;transform:translateY(-60%);
  width:36px;height:36px;border-radius:50%;
  background:rgba(8,61,119,.75);
  backdrop-filter:blur(6px);
  border:none;cursor:pointer;z-index:10;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .15s;
  box-shadow:0 2px 12px rgba(0,0,0,.15);
}
.ugc-arrow:hover{background:var(--navy);transform:translateY(-60%) scale(1.06)}
.ugc-arrow svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.ugc-prev{left:6px}
.ugc-next{right:6px}
@media(max-width:640px){.ugc-arrow{display:none}}

/* ─── PROGRESS BAR ────────────────────────────────── */
.ugc-prog-wrap{
  height:2px;
  background:rgba(8,61,119,.12);
  border-radius:2px;
  margin:18px 48px 0;
  overflow:hidden;
}
@media(max-width:640px){.ugc-prog-wrap{margin:16px 16px 0}}
.ugc-prog-bar{
  height:100%;width:0%;
  background:var(--navy);
  border-radius:2px;
  transition:width linear;
}

/* ─── MODAL ───────────────────────────────────────── */
.ugc-modal{
  position:fixed;inset:0;
  z-index:9999;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;
  transition:opacity .25s ease;
}
.ugc-modal.open{opacity:1;pointer-events:auto}
.ugc-modal-inner{
  position:relative;
  width:min(380px,90vw);
  aspect-ratio:9/16;
  border-radius:16px;
  overflow:hidden;
  background:#000;
  transform:scale(.92);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
}
.ugc-modal.open .ugc-modal-inner{transform:scale(1)}
.ugc-modal-video{
  width:100%;height:100%;
  object-fit:cover;display:block;
}
.ugc-modal-close{
  position:absolute;top:12px;right:12px;
  width:34px;height:34px;border-radius:50%;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(8px);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:2;transition:background .2s;
}
.ugc-modal-close:hover{background:rgba(0,0,0,.8)}
.ugc-modal-close svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}
</style>
</head>

      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
</div>

<script>
!function(){
  'use strict';

  /* ── ELEMENTS ─────────────────────────────────── */
  var viewport=document.getElementById('ugcViewport');
  var track=document.getElementById('ugcTrack');
  var bar=document.getElementById('ugcBar');
  var modal=document.getElementById('ugcModal');
  var modalVideo=document.getElementById('ugcModalVideo');
  var cards=[].slice.call(document.querySelectorAll('.ugc-card'));
  var n=cards.length;
  var cur=0;
  var GAP=12;
  var DURATION=6000;
  var autoTimer=null;
  var progTimer=null;
  var progStart=null;
  var hovered=false;

  /* ── LAZY LOAD via IntersectionObserver ───────── */
  var io=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        var vid=e.target.querySelector('video');
        if(vid&&!vid.src){
          vid.src=vid.getAttribute('data-src');
          vid.load();
        }
        io.unobserve(e.target);
      }
    });
  },{rootMargin:'100px'});
  cards.forEach(function(c){io.observe(c)});

  /* ── CARD WIDTH ───────────────────────────────── */
  function perView(){return window.innerWidth<=640?2:3}
  function cardWidth(){
    var vw=viewport.offsetWidth-(window.innerWidth<=640?0:96);
    return(vw-(perView()-1)*GAP)/perView();
  }
  function setWidths(){
    var cw=cardWidth();
    cards.forEach(function(c){c.style.width=cw+'px'});
  }

  /* ── GO TO ────────────────────────────────────── */
  function maxIdx(){return Math.max(0,n-perView())}
  function goTo(idx,skipProg){
    cur=((idx%maxIdx())+maxIdx())%maxIdx();
    if(n<=perView())cur=0;
    track.style.transform='translateX(-'+(cur*(cardWidth()+GAP))+'px)';
    if(!skipProg)startProg();
  }

  /* ── PROGRESS BAR ─────────────────────────────── */
  function startProg(){
    bar.style.transition='none';
    bar.style.width='0%';
    clearTimeout(progTimer);
    cancelAnimationFrame(progRAF);
    if(hovered)return;
    var start=null;
    function step(ts){
      if(!start)start=ts;
      var p=Math.min((ts-start)/DURATION*100,100);
      bar.style.transition='none';
      bar.style.width=p+'%';
      if(p<100)progRAF=requestAnimationFrame(step);
    }
    progRAF=requestAnimationFrame(step);
    progTimer=setTimeout(function(){
      if(!hovered)goTo(cur+1);
    },DURATION);
  }
  var progRAF;

  /* ── AUTO ─────────────────────────────────────── */
  function stopAuto(){
    clearTimeout(progTimer);
    cancelAnimationFrame(progRAF);
    bar.style.transition='none';
    bar.style.width='0%';
  }
  function resumeAuto(){startProg()}

  /* ── ARROWS ───────────────────────────────────── */
  document.getElementById('ugcPrev').addEventListener('click',function(){
    stopAuto();goTo(cur-1);
  });
  document.getElementById('ugcNext').addEventListener('click',function(){
    stopAuto();goTo(cur+1);
  });

  /* ── HOVER PAUSE ──────────────────────────────── */
  viewport.addEventListener('mouseenter',function(){hovered=true;stopAuto()});
  viewport.addEventListener('mouseleave',function(){hovered=false;resumeAuto()});

  /* ── DRAG (desktop) ───────────────────────────── */
  var dragX=0,dragging=false,dragMoved=false;
  viewport.addEventListener('mousedown',function(e){
    dragX=e.clientX;dragging=true;dragMoved=false;
    track.classList.add('dragging');
    stopAuto();
  });
  window.addEventListener('mousemove',function(e){
    if(!dragging)return;
    if(Math.abs(e.clientX-dragX)>6)dragMoved=true;
    var dx=e.clientX-dragX;
    track.style.transform='translateX(-'+(cur*(cardWidth()+GAP)-dx)+'px)';
  });
  window.addEventListener('mouseup',function(e){
    if(!dragging)return;
    dragging=false;
    track.classList.remove('dragging');
    var dx=e.clientX-dragX;
    if(Math.abs(dx)>60){goTo(dx<0?cur+1:cur-1)}
    else{goTo(cur,true);startProg()}
  });

  /* ── SWIPE (mobile) ───────────────────────────── */
  var tx=0,ty=0;
  viewport.addEventListener('touchstart',function(e){
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;dragMoved=false;
    stopAuto();
  },{passive:true});
  viewport.addEventListener('touchmove',function(e){
    var dx=Math.abs(e.touches[0].clientX-tx);
    var dy=Math.abs(e.touches[0].clientY-ty);
    if(dx>dy&&dx>8){dragMoved=true;e.preventDefault();}
  },{passive:false});
  viewport.addEventListener('touchend',function(e){
    var dx=tx-e.changedTouches[0].clientX;
    if(Math.abs(dx)>50)goTo(dx>0?cur+1:cur-1);
    else{goTo(cur,true);startProg()}
  },{passive:true});

  /* ── CLICK → MODAL ────────────────────────────── */
  cards.forEach(function(card){
    card.addEventListener('click',function(){
      if(dragMoved)return;
      var src=card.getAttribute('data-src');
      modalVideo.src=src;
      modalVideo.load();
      modalVideo.play().catch(function(){});
      modal.classList.add('open');
      document.body.style.overflow='hidden';
    });
  });

  function closeModal(){
    modal.classList.remove('open');
    modalVideo.pause();
    modalVideo.src='';
    document.body.style.overflow='';
    resumeAuto();
  }
  document.getElementById('ugcClose').addEventListener('click',closeModal);
  modal.addEventListener('click',function(e){if(e.target===modal)closeModal()});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});

  /* ── RESIZE ───────────────────────────────────── */
  var resizeTimer;
  window.addEventListener('resize',function(){
    clearTimeout(resizeTimer);
    resizeTimer=setTimeout(function(){
      setWidths();
      goTo(Math.min(cur,maxIdx()),true);
      startProg();
    },120);
  });

  /* ── INIT ─────────────────────────────────────── */
  setWidths();
  goTo(0);

}();
</script>
</body>
</html>
