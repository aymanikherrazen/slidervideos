<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Luminelle — UGC</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#083D77;--blue:#2bb3f3;--gap:14px}
body{background:#fff;font-family:'Poppins',sans-serif;-webkit-font-smoothing:antialiased}

/* ── SECTION ── */
.ugc{
  width:100%;
  background:#2bb3f3;
  padding:40px 0 44px;
  overflow:hidden;
}

/* ── WHITE CARD WRAPPER ── */
.ugc-inner{
  max-width:1100px;
  margin:0 auto;
  background:#fff;
  border-radius:20px;
  padding:28px 20px 24px;
  mx:16px;
  margin-left:16px;
  margin-right:16px;
}

/* ── VIEWPORT ── */
.ugc-viewport{
  position:relative;
  overflow:hidden;
  touch-action:pan-y;
}

/* ── TRACK ── */
.ugc-track{
  display:flex;
  gap:var(--gap);
  will-change:transform;
  transition:transform .8s cubic-bezier(.25,.1,.25,1);
}
.ugc-track.no-transition{transition:none}

/* ── CARD ── */
.ugc-card{
  flex-shrink:0;
  border-radius:14px;
  overflow:hidden;
  position:relative;
  background:#000;
  aspect-ratio:9/16;
}

/* ── VIDEO ── */
.ugc-video{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  pointer-events:none;
}

/* ── GRADIENT ── */
.ugc-grad{
  position:absolute;inset:0;
  background:linear-gradient(
    to top,
    rgba(0,0,0,.85) 0%,
    rgba(0,0,0,.1) 50%,
    transparent 70%
  );
  z-index:1;pointer-events:none;
}

/* ── INSTAGRAM BADGE OVERLAY (top left) ── */
.ugc-ig{
  position:absolute;top:10px;left:10px;
  z-index:3;
  display:flex;align-items:center;gap:6px;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(8px);
  border-radius:20px;
  padding:4px 10px 4px 4px;
}
.ugc-ig-avatar{
  width:26px;height:26px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.5);
  object-fit:cover;background:#2bb3f3;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:#fff;
  flex-shrink:0;overflow:hidden;
}
.ugc-ig-name{font-size:10px;font-weight:600;color:#fff;white-space:nowrap}
.ugc-ig-badge{
  width:14px;height:14px;flex-shrink:0;
}

/* ── BIG PLAY BUTTON (center) ── */
.ugc-play-btn{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:3;
  width:52px;height:52px;
  border-radius:50%;
  background:rgba(255,255,255,.25);
  backdrop-filter:blur(10px);
  border:2px solid rgba(255,255,255,.6);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s,background .2s;
}
.ugc-play-btn:hover{background:rgba(255,255,255,.4);transform:translate(-50%,-50%) scale(1.08)}
.ugc-play-btn svg{width:18px;height:18px;fill:#fff;margin-left:3px}
.ugc-card.playing .ugc-play-btn{display:none}

/* ── INLINE CONTROLS (shown when playing) ── */
.ugc-controls{
  position:absolute;bottom:0;left:0;right:0;
  z-index:4;
  padding:10px 12px 12px;
  display:none;
  flex-direction:column;
  gap:6px;
}
.ugc-card.playing .ugc-controls{display:flex}
.ugc-ctrl-row{display:flex;align-items:center;justify-content:space-between}
.ugc-ctrl-left{display:flex;align-items:center;gap:8px}

/* ── PROGRESS LINE ── */
.ugc-vid-prog{
  width:100%;height:2px;
  background:rgba(255,255,255,.3);
  border-radius:2px;overflow:hidden;
}
.ugc-vid-prog-fill{
  height:100%;width:0%;
  background:#fff;
  border-radius:2px;
  transition:none;
}

.ugc-cb{
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.2);
  backdrop-filter:blur(8px);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
  flex-shrink:0;
}
.ugc-cb:hover{background:rgba(255,255,255,.35)}
.ugc-cb svg{width:13px;height:13px;fill:#fff;stroke:none}
.ugc-cb.stroke svg{fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── META (bottom) ── */
.ugc-meta{
  position:absolute;bottom:52px;left:12px;right:12px;
  z-index:3;pointer-events:none;
}
.ugc-card.playing .ugc-meta{bottom:78px}
.ugc-stars{display:flex;gap:2px;margin-bottom:3px}
.ugc-stars svg{width:10px;height:10px;fill:#FFD700}
.ugc-uname{font-size:11px;font-weight:600;color:#fff;letter-spacing:.01em;text-shadow:0 1px 4px rgba(0,0,0,.6)}

/* ── ARROWS ── */
.ugc-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.9);
  border:none;cursor:pointer;z-index:10;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
  transition:background .2s,transform .15s;
}
.ugc-arrow:hover{background:#fff;transform:translateY(-50%) scale(1.06)}
.ugc-arrow svg{width:14px;height:14px;stroke:var(--navy);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.ugc-prev{left:-42px}.ugc-next{right:-42px}
@media(max-width:640px){.ugc-arrow{display:none}}

/* ── PROGRESS BAR ── */
.ugc-prog-wrap{
  height:2px;background:rgba(43,179,243,.2);
  border-radius:2px;margin-top:16px;overflow:hidden;
}
.ugc-prog-bar{height:100%;width:0%;background:var(--navy);border-radius:2px}

/* ── MOBILE: prevent vertical scroll on track ── */
@media(max-width:640px){
  .ugc-inner{padding:20px 12px 18px;border-radius:16px}
  .ugc-viewport{touch-action:pan-x}
}
</style>
</head>

                <button class="ugc-cb ugc-fs stroke"><svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- PROGRESS BAR -->
      <div class="ugc-prog-wrap">
        <div class="ugc-prog-bar" id="ugcBar"></div>
      </div>

    </div>
  </div>
</section>

<script>
!function(){
'use strict';
var GAP=14,DURATION=7000;
var track=document.getElementById('ugcTrack');
var vp=document.getElementById('ugcVP');
var bar=document.getElementById('ugcBar');
var cards=[].slice.call(document.querySelectorAll('.ugc-card'));
var n=cards.length;
var cur=0,hovered=false,autoT=null,progRAF=null,progT=null;
var playIcon='<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
var pauseIcon='<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
var muteIcon='<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
var soundIcon='<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';

/* ── LAZY LOAD ── */
var io=new IntersectionObserver(function(es){
  es.forEach(function(e){
    if(e.isIntersecting){
      var c=e.target,vid=c.querySelector('video');
      if(!vid.src){vid.src=c.getAttribute('data-src');vid.load();}
      io.unobserve(c);
    }
  });
},{rootMargin:'80px'});
cards.forEach(function(c){io.observe(c)});

/* ── SIZING ── */
function pv(){return window.innerWidth<=640?2:3}
function cw(){var w=vp.offsetWidth;return(w-(pv()-1)*GAP)/pv();}
function setW(){var v=cw();cards.forEach(function(c){c.style.width=v+'px'});}

/* ── SLIDE ── */
function maxI(){return Math.max(0,n-pv());}
function goTo(i,skipProg){
  cur=Math.min(Math.max(i,0),maxI());
  track.style.transform='translateX(-'+(cur*(cw()+GAP))+'px)';
  if(!skipProg)startProg();
}

/* ── PROGRESS ── */
function startProg(){
  bar.style.transition='none';bar.style.width='0%';
  cancelAnimationFrame(progRAF);clearTimeout(progT);
  if(hovered)return;
  var s=null;
  function step(ts){
    if(!s)s=ts;
    var p=Math.min((ts-s)/DURATION*100,100);
    bar.style.width=p+'%';
    if(p<100){progRAF=requestAnimationFrame(step);}
  }
  progRAF=requestAnimationFrame(step);
  progT=setTimeout(function(){if(!hovered)goTo(cur+1>maxI()?0:cur+1);},DURATION);
}
function stopProg(){cancelAnimationFrame(progRAF);clearTimeout(progT);bar.style.transition='none';bar.style.width='0%';}

/* ── HOVER ── */
vp.addEventListener('mouseenter',function(){hovered=true;stopProg();});
vp.addEventListener('mouseleave',function(){hovered=false;startProg();});

/* ── STOP ALL VIDEOS ── */
function stopAll(except){
  cards.forEach(function(c){
    if(c===except)return;
    var v=c.querySelector('video');
    v.pause();v.currentTime=0;
    c.classList.remove('playing');
    var pp=c.querySelector('.ugc-pp');
    if(pp)pp.innerHTML=playIcon;
    var pf=c.querySelector('.ugc-vid-prog-fill');
    if(pf){pf.style.width='0%';cancelAnimationFrame(c._raf);}
  });
}

/* ── VIDEO PROGRESS UPDATE ── */
function updateVidProg(card,vid){
  var fill=card.querySelector('.ugc-vid-prog-fill');
  if(!fill)return;
  function tick(){
    if(vid.paused||vid.ended)return;
    fill.style.width=(vid.currentTime/vid.duration*100)+'%';
    card._raf=requestAnimationFrame(tick);
  }
  cancelAnimationFrame(card._raf);
  card._raf=requestAnimationFrame(tick);
}

/* ── PLAY BTN ── */
cards.forEach(function(card){
  var vid=card.querySelector('video');
  var playBtn=card.querySelector('.ugc-play-btn');
  var pp=card.querySelector('.ugc-pp');
  var mu=card.querySelector('.ugc-mu');
  var fs=card.querySelector('.ugc-fs');
  var fill=card.querySelector('.ugc-vid-prog-fill');

  // big center play button
  playBtn.addEventListener('click',function(){
    if(!vid.src){vid.src=card.getAttribute('data-src');vid.load();}
    stopAll(card);
    vid.muted=false;
    vid.play().catch(function(){vid.muted=true;vid.play();});
    card.classList.add('playing');
    pp.innerHTML=pauseIcon;
    mu.innerHTML=soundIcon;
    updateVidProg(card,vid);
    stopProg();
  });

  // play/pause toggle
  pp.addEventListener('click',function(e){e.stopPropagation();
    if(vid.paused){vid.play();pp.innerHTML=pauseIcon;updateVidProg(card,vid);}
    else{vid.pause();pp.innerHTML=playIcon;}
  });

  // mute toggle
  mu.addEventListener('click',function(e){e.stopPropagation();
    vid.muted=!vid.muted;
    mu.innerHTML=vid.muted?muteIcon:soundIcon;
  });

  // fullscreen
  fs.addEventListener('click',function(e){e.stopPropagation();
    if(vid.requestFullscreen)vid.requestFullscreen();
    else if(vid.webkitEnterFullscreen)vid.webkitEnterFullscreen();
  });

  // video ended — stop, reset
  vid.addEventListener('ended',function(){
    card.classList.remove('playing');
    pp.innerHTML=playIcon;
    if(fill){fill.style.width='0%';cancelAnimationFrame(card._raf);}
    startProg();
  });
});

/* ── ARROWS ── */
document.getElementById('ugcPrev').addEventListener('click',function(){stopAll();goTo(cur-1);});
document.getElementById('ugcNext').addEventListener('click',function(){stopAll();goTo(cur+1>maxI()?0:cur+1);});

/* ── TOUCH SWIPE (horizontal only, allow vertical scroll) ── */
var tx=0,ty=0,moved=false,hScroll=false;
vp.addEventListener('touchstart',function(e){
  tx=e.touches[0].clientX;ty=e.touches[0].clientY;moved=false;hScroll=false;
},{passive:true});
vp.addEventListener('touchmove',function(e){
  var dx=Math.abs(e.touches[0].clientX-tx);
  var dy=Math.abs(e.touches[0].clientY-ty);
  if(!moved){
    if(dx>dy&&dx>8){hScroll=true;}
    moved=true;
  }
  if(hScroll){e.preventDefault();}
},{passive:false});
vp.addEventListener('touchend',function(e){
  if(!hScroll)return;
  var dx=tx-e.changedTouches[0].clientX;
  if(Math.abs(dx)>50){stopAll();goTo(dx>0?cur+1:cur-1);}
},{passive:true});

/* ── MOUSE DRAG ── */
var mx=0,dragging=false,didDrag=false;
vp.addEventListener('mousedown',function(e){mx=e.clientX;dragging=true;didDrag=false;stopProg();});
window.addEventListener('mousemove',function(e){
  if(!dragging)return;
  if(Math.abs(e.clientX-mx)>6)didDrag=true;
  track.classList.add('no-transition');
  track.style.transform='translateX(-'+(cur*(cw()+GAP)-(e.clientX-mx))+'px)';
});
window.addEventListener('mouseup',function(e){
  if(!dragging)return;
  dragging=false;track.classList.remove('no-transition');
  var dx=e.clientX-mx;
  if(Math.abs(dx)>60){stopAll();goTo(dx<0?cur+1:cur-1);}
  else{goTo(cur);}
});

/* ── RESIZE ── */
var rt;
window.addEventListener('resize',function(){
  clearTimeout(rt);rt=setTimeout(function(){setW();goTo(Math.min(cur,maxI()),true);startProg();},120);
});

/* ── INIT ── */
setW();goTo(0);
}();
</script>
</body>
</html>
